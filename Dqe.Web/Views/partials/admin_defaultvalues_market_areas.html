<div class="row">
    <div class="col-lg-1">
        New Market Area:
    </div>
    <div class="col-lg-3">
        <input type="text" ng-model="newMarketArea" class="form-control"/>
    </div>
    <div class="col-lg-7">
        <button class="btn btn-primary" ng-click="addNewMarketArea()" ng-disabled="newMarketArea == ''">Submit</button>
    </div>
</div>
<br/>
<div class="row">
    <div class="col-lg-6">
        <table class="table table-bordered table-condensed">
            <thead>
                <tr>
                    <td style="width: 20%;"></td>
                    <td style="width: 40%;">Market Area</td>
                    <td style="width: 40%;">Counties</td>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="marketArea in marketAreas">
                    <td>
                        <a href="" ng-click="removeMarketArea(marketArea)">Remove</a>
                    </td>
                    <td>{{marketArea.name}}</td>
                    <td>
                        <table class="table table-bordered table-condensed">
                            <tr ng-repeat="county in marketArea.counties">
                                <td>
                                    <a href="" ng-click="removeCounty(county)">Remove</a>
                                </td>
                                <td>{{county.name}}</td>
                            </tr>
                            <tr>
                                <td style="width: 30%;">Add</td>
                                <td style="width: 70%;">
                                    <select class="form-control" ng-model="marketArea.newCounty" ng-change="addCounty(marketArea)" ng-options="unassignedCounty.name for unassignedCounty in unassignedCounties">
                                        <option value="">--Select--</option>
                                    </select>
                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>
            </tbody>
        </table>        
    </div>
</div>
