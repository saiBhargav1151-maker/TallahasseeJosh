-->
<div class="row">
    <div class="col-lg-12">
        <h3>Proposal Selection</h3>
    </div>
</div>
<br />
<div ng-show="copyMasterFileInProcess == true">
    Master File is currently being copied.  Please wait...
</div>
<div ng-hide="copyMasterFileInProcess == true">
    <div class="row">
        <div class="col-lg-1">
            <label for="proposalNumber">Proposal Number:</label>
        </div>
        <div class="col-lg-2">
            <input id="proposalNumber" type="text" ng-model="selectedProposal" placeholder="123451" typeahead-min-length="3" typeahead-wait-ms="500" typeahead="proposal as proposal.number for proposal in getProposals($viewValue)" typeahead-editable="false" typeahead-on-select="loadProposal()" class="form-control">
        </div>
    </div>
</div>
<hr />
<div ng-show="proposal != undefined && proposal != null">
    <div class="row">
        <div class="col-lg-12">
            <h3>Selected Proposal</h3>
        </div>
    </div>
    <br/>
    <div class="row">
        <div class="col-lg-5">
            <div class="row">
                <div class="col-lg-2">
                    Proposal:
                </div>
                <div class="col-lg-10">
                    {{proposal.number}}
                </div>
            </div>
            <br />
            <div class="row" ng-show="projects != 'undefined' && projects != null && projects.length > 0">
                <div class="col-lg-12">
                    <table class="table table-bordered table-condensed table-hover table-striped">
                        <thead>
                            <tr>
                                <td>Project</td>
                                <td>Owner</td>
                                <td>Custody</td>
                                <td>Working Estimate</td>
                                <td>Synchronized with Web Trns*Port</td>
                            </tr>
                        </thead>
                        <tbody>
                            <tr ng-repeat="project in projects">
                                <td>
                                    <a href="#/home_selection_project/{{project.number}}">{{project.number}}</a>
                                </td>
                                <td>{{project.owner}}</td>
                                <td>
                                    <span class="text-success glyphicon glyphicon-ok" ng-show="project.hasCustody"></span>
                                    <span class="text-danger glyphicon glyphicon-remove" ng-show="!project.hasCustody"></span>
                                </td>
                                <td>
                                    <span class="text-success glyphicon glyphicon-ok" ng-show="project.hasWorkingEstimate"></span>
                                    <span class="text-danger glyphicon glyphicon-remove" ng-show="!project.hasWorkingEstimate"></span>
                                </td>
                                <td>
                                    <span ng-show="project.isSynced == null">Pending...</span>
                                    <span class="text-success glyphicon glyphicon-ok" ng-show="project.isSynced == true"></span>
                                    <span class="text-danger glyphicon glyphicon-remove" ng-show="project.isSynced == false"></span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <br />
        </div>
        <div class="col-lg-7">
            <div class="row">
                <div class="col-lg-2">
                    Description:
                </div>
                <div class="col-lg-10">
                    {{proposal.description}}
                </div>
            </div>
        </div>
    </div>
</div>
