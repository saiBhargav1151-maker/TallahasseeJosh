<div class="row" ng-if="impersonate">
    <div class="col-lg-4">
        <input type="text" ng-model="impersonateUser.selected" placeholder="Enter a user name" typeahead-min-length="3" typeahead-wait-ms="500" typeahead="user as user.fullName for user in getUsers($viewValue)" typeahead-editable="false" typeahead-on-select="setDistrict()" class="form-control">
    </div>
    <div class="col-lg-2">
        <select class="form-control" ng-model="impersonateUser.district">
            <option>CO</option>
            <option>D1</option>
            <option>D2</option>
            <option>D3</option>
            <option>D4</option>
            <option>D5</option>
            <option>D6</option>
            <option>D7</option>
            <option>TP</option>
        </select>
    </div>
    <div class="col-lg-2" ng-show="impersonateUser.district == 'CO'">
        <select class="form-control" ng-model="impersonateUser.role">
            <option value="A">System Administrator</option>
            <option value="P">Pay Item Administrator</option>
            <option value="T">Cost-Based Template Administrator</option>
            <option value="E">Estimator</option>
        </select>
    </div>
    <div class="col-lg-2" ng-show="impersonateUser.district.startsWith('D') || impersonateUser.district == 'TP'">
        <select class="form-control" ng-model="impersonateUser.role">
            <option value="D">District Administrator</option>
            <option value="E">Estimator</option>
        </select>
    </div>
    <div class="col-lg-4">
        <button type="button" class="btn btn-primary" ng-click="postUser()" ng-disabled="isSubmitUserDisabled()">Submit</button>
        <button type="button" class="btn btn-default" ng-click="initializeEditForm()">Reset</button>
    </div>
</div>
<div ng-if="!impersonate">
    <form>
        <div class="row">
            <div class="col-lg-4"></div>
            <div class="col-lg-1">User Name:</div>
            <div class="col-lg-2">
                <input ng-model="userName" class="form-control" />
            </div>
            <div class="col-lg-5"></div>
        </div>
        <div class="row">
            <div class="col-lg-4"></div>
            <div class="col-lg-1">Password:</div>
            <div class="col-lg-2">
                <input ng-model="password" class="form-control" type="password" />
            </div>
            <div class="col-lg-5"></div>
        </div>
        <div class="row">
            <div class="col-lg-5"></div>
            <div class="col-lg-2">
                <button type="submit" class="btn btn-primary" ng-click="login(userName, password)" ng-disabled="!canAttemptLogin(userName, password)">Login</button>
            </div>
            <div class="col-lg-5"></div>
        </div>
    </form>
</div>
<div ng-if="canImpersonate && !impersonate">
    <a href="" ng-click="showImpersonation()">Impersonate Security</a>
</div>
<div ng-if="impersonate">
    <a href="" ng-click="showLogin()">RACF Login</a>
</div>
