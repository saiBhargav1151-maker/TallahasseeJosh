<br/>
Code Type
<div class="row">
    <div class="col-lg-2">
        <select class="form-control" ng-model="codeType" ng-change="getCodes()">
            <option value="--" selected>--Select a code to manage--</option>
            <!--<option value="PU">Primary Unit</option>
            <option value="SU">Secondary Unit</option>-->
        </select>
    </div>
</div>
<br/>
<div class="row" ng-show="codeType != '--'">
    <div class="col-lg-4">
        <table class="table table-bordered table-condensed table-striped">
            <thead>
                <tr>
                    <td>Code</td>
                    <td class="text-center">Active</td>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="code in codes">
                    <td>
                        <input type="text" ng-model="code.name" class="form-control" />
                    </td>
                    <td>
                        <input type="checkbox" ng-model="code.isActive" class="form-control">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="text" ng-model="newCode.name" class="form-control" />
                    </td>
                    <td>
                        <input type="checkbox" ng-model="newCode.isActive" class="form-control">
                    </td>
                </tr>
            </tbody>
        </table>        
    </div>    
</div>
<br/>
<div class="row" ng-show="codeType != '--'">
    <div class="col-lg-4">
        <button class="btn btn-primary" ng-disabled="newCode.name == '' && codes.length == 0" ng-click="updateCodes()">Submit</button>
    </div>
</div>
