<div class="row">
<table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Pay Item</th>
                <th>Master File</th>
                <th>Asphalt Factor</th>
                <th>Concrete Factor</th>
            </tr>
        </thead>
        <tbody>
            <tr ng-repeat="item in payItems">
                <td>{{item.payItemId}}</td>
                <td>{{item.masterFileId}}</td>
                <td class="col-lg-3"><input type="text" ng-model="item.asphaltFactor" class="form-control" /></td>
                <td class="col-lg-3"><input type="text" ng-model="item.concreteFactor" class="form-control" /></td>
            </tr>
        </tbody>
    </table>
</div>
<div class="row">
    <div class="col-lg-12">
        <button class="btn btn-primary" ng-click="submitFactors()">Submit</button>
    </div>
</div>
