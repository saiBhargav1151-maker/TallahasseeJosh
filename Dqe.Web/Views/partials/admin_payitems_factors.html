<div>
    <div class="row">
        <div class="col-lg-2">
            Filter Master File: <input class="form-control" ng-model="queryMf">
        </div>
        <div class="col-lg-2">
            Filter Pay Item Number: <input class="form-control" ng-model="query">
        </div>
        <div class="col-lg-2">
            View Pay Item Range:
            <select class="form-control" ng-model="structureRange">
                <option value="0">0000</option>
                <option value="1">0100</option>
                <option value="2">0200</option>
                <option value="3">0300</option>
                <option value="4">0400</option>
                <option value="5">0500</option>
                <option value="6">0600</option>
                <option value="7">0700</option>
                <option value="8">0800</option>
                <option value="9">0900</option>
                <option value="10">Other</option>
                <option value="11">All</option>
            </select>
        </div>
    </div>
    <br />
    <div class="row">
        <div class="col-lg-12">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th>Pay Item</th>
                        <th>Master File</th>
                        <th>Asphalt Factor</th>
                        <th>Concrete Factor</th>
                    </tr>
                </thead>
                <tbody>
                    <tr ng-repeat="item in payItems | filter:{payItemId:query, masterFileId:queryMf} | orderBy:['payItemId', 'masterFileId']">
                        <td>{{item.payItemId}}</td>
                        <td>{{item.masterFileId}}</td>
                        <td class="col-lg-3"><input type="text" ng-model="item.asphaltFactor" class="form-control" /></td>
                        <td class="col-lg-3"><input type="text" ng-model="item.concreteFactor" class="form-control" /></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="row">
        <div class="col-lg-12">
            <button class="btn btn-primary" ng-click="submitFactors()">Submit</button>
        </div>
    </div>
    <br/>
</div>
