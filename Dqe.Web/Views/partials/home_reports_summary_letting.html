<div class="col-lg-6">
    <form method="POST" id="ViewSummaryOfLettingReport" autocomplete="off">
        <div class="panel panel-default">
            <div class="panel-heading">
                <h4>Executive Summary of Letting</h4>
            </div>
            <div class="panel-body">
                <div class="row">
                    <div class="col-lg-3">
                        Letting Id
                    </div>
                    <div class="col-lg-2">
                        <input name="lettingNumber" id="lettingNumber" title="Letting ID" type="text" ng-model="selectedLetting" placeholder="123451" typeahead-min-length="3" typeahead-wait-ms="500" typeahead="letting as letting.number for letting in getLettings($viewValue)" typeahead-editable="false" class="form-control" autocomplete="off">
                    </div>
                </div>
                <div class="row">
                    <div class="col-lg-3">
                    </div>
                    <div class="col-lg-2">
                        <button class="btn btn-primary" title="Click to download the report - file type: PDF file size: unknown" ng-disabled="selectedLetting == undefined || selectedLetting == null || selectedLetting == ''" ng-click="viewSummaryOfLettingReport()">View Report</button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
