<div class="row">
    <div class="col-lg-12">
        <h3>LRE Project Selection</h3>
        <form class="form-inline" role="form">
            <div class="form-group">
                <label for="projectNumber">LRE Project Number:</label>
                <input id="projectNumber" type="text" class="form-control" placeholder="123456-1-52-01">
            </div>
        </form>
        <div class="radio">
            <label>
                <input type="radio" name="optionsRadios3" id="optionsRadios31" value="option1" checked>
                Import Project from LRE
            </label>
        </div>
        <div class="radio">
            <label>
                <input type="radio" name="optionsRadios3" id="optionsRadios32" value="option2">
                Refresh Project from LRE
            </label>
        </div>
        <div class="radio">
            <label>
                <input type="radio" name="optionsRadios3" id="optionsRadios33" value="option1" checked>
                Export Project to LRE
            </label>
        </div>
        <div class="radio">
            <label>
                <input type="radio" name="optionsRadios3" id="optionsRadios34" value="option2">
                Export Project to PrP-AASHTOWare Project Preconstruction
            </label>
        </div>
        <div>
            <button class="btn btn-primary">Submit</button>
        </div>
    </div>
</div>
