<div class="row">
    <div class="col-lg-2">
        Template Name:
    </div>
    <div class="col-lg-2">
        Result Cell:
    </div>
    <div class="col-lg-4">
        Excel File:
    </div>
    <div class="col-lg-4">
    </div>
</div>
<div class="row">
    <div class="col-lg-2">
        <input title="Template name" type="text" class="form-control" ng-model="currentTemplate.name" />
    </div>
    <div class="col-lg-2">
        <input title="Result cell" type="text" class="form-control" ng-model="currentTemplate.resultCell" />
    </div>
    <div class="col-lg-4">
        <form novalidate id="CostTemplateForm">
            <input type="file" title="Select file" file-model="currentTemplate.file" id="test" />
        </form>
    </div>
    <div class="col-lg-4">
        <button class="btn btn-primary" title="Click to upload the document" ng-click="upload()" ng-disabled="isSaveDisabled()">{{currentTemplate.id == 0 ? 'Add' : 'Update'}}</button>
        <button class="btn btn-default" title="Click to reset the form" ng-click="resetForm()">Reset</button>
    </div>
</div>
<br />
<div class="row">
    <div class="col-lg-12">
        <table class="table table-bordered table-condensed table-striped">
            <thead>
                <tr>
                    <td style="width: 10%"></td>
                    <td style="width: 70%">Name</td>
                    <td style="width: 10%">Cell</td>
                    <td style="width: 10%">Download</td>
                </tr>    
            </thead>
            <tbody>
                <tr ng-repeat="template in templates">
                    <td>
                        <a href="" title="Click to remove this cost based template" ng-show="!confirmRemoveCostBasedTemplate" ng-click="confirmRemoveCostBasedTemplate = true">Remove</a>
                        <div ng-show="confirmRemoveCostBasedTemplate">
                            <div>Confirm?</div>
                            <a href="" title="Click to confirm the removal of the cost based template" ng-click="removeTemplate(template); confirmRemoveCostBasedTemplate = false">Yes</a>&nbsp;&nbsp;
                            <a href="" title="Click to cancel the removal of the cost based template" ng-click="confirmRemoveCostBasedTemplate = false">No</a>
                        </div>
                    </td>
                    <td><a href="" title="Click to edit the template: {{template.name}}" ng-click="editTemplate(template)">{{template.name}}</a></td>
                    <td>{{template.resultCell}}</td>
                    <td><a ng-href="{{downloadUrl(template)}}" title="Click to open {{template.name}} - opens a new browser window" target="_blank"><i class="glyphicon glyphicon-download-alt"></i></a></td>
                </tr>    
            </tbody>
        </table>
    </div>
</div>
