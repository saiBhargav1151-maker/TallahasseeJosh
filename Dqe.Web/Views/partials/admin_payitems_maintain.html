<div class="row">
    <div class="col-lg-3">
        <div class="radio">
            <label>
                <input type="radio" name="optionsRadios1" id="optionsRadios11" value="option1" checked>
                View Current Structures Only
            </label>
        </div>
    </div>
    <div class="col-lg-6">
        <div class="radio">
            <label>
                <input type="radio" name="optionsRadios1" id="optionsRadios12" value="option2">
                View Current and Obsolete Structures
            </label>
        </div>
    </div>
</div>
<div class="row">
    <div class="col-lg-12">
        <accordion>
            <accordion-group heading="{{payItemStructureGroup.heading}}" ng-repeat="payItemStructureGroup in payItemStructureGroups">
                <admin-pay-item-structure ng-repeat="payItemStructure in payItemStructureGroup.payItemStructures" pay-item-structure="payItemStructure"/>
            </accordion-group>
        </accordion>
    </div>
</div>
