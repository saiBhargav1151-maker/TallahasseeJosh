<div class="col-lg-12">
    <div ng-hide="!createNewMasterFile.shouldCreate">
        <div class="row">
            <div class="col-lg-3">
                New Master File set to be created on {{masterFile.effectiveDate}}
            </div>
        </div>
        <br />
        <div class="row">
            <div class="col-lg-3">
                <button type="button" class="btn btn-primary" title="Cancel new Master File" ng-click="cancelMasterFile(masterFile)">Cancel</button>
            </div>
        </div>
    </div>
    <div ng-hide="createNewMasterFile.shouldCreate">
        <div class="row">
            <div class="col-lg-3">
                Select Open Date for Master File
            </div>
        </div>
        <div class="row">
            <div class="col-lg-3">
                <p class="input-group">
                    <input type="text" title="Opened date" class="form-control" datepicker-popup="MM/dd/yyyy" ng-model="masterFile.effectiveDate" is-open="masterFile.validDateOpened" maxlength="10" ng-change="changeMasterFileNumber()" />
                    <span class="input-group-btn">
                        <button type="button" title="Click to open date picker" class="btn btn-default" ng-click="validDateOpen($event, masterFile)"><i class="glyphicon glyphicon-calendar"></i></button>
                    </span>
                </p>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-3">
                New Master File Number: {{masterFile.specBook}}
            </div>
        </div>
        <br />
        <div class="row">
            <div class="col-lg-2">
                <button type="button" class="btn btn-primary" title="Create new Master File" ng-disabled="masterFile.effectiveDate == '' || masterFile.specBook == ''" ng-click="saveMasterFile(masterFile)">Save</button>
            </div>
        </div>
    </div>
</div>
